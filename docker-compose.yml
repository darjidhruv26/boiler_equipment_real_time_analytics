services:
 
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
      - "7071:7071"
      - "9999:9999"

    environment:
      # KRaft required
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      
      # Simplified listeners (fixes connection issues)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      
      # Storage
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      
      # JMX for Prometheus
      KAFKA_JMX_PORT: 9999
      KAFKA_JMX_HOSTNAME: localhost
      KAFKA_JVM_PERFORMANCE_OPTS: "-javaagent:/opt/jmx-exporter/jmx_prometheus_javaagent-0.20.0.jar=7071:/opt/jmx-exporter/kafka.yml"
      
      # Topic settings
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      
      # Cluster ID (required for KRaft)
      CLUSTER_ID: 5L6g3nShT-eMCtK--X86sw

    volumes:
      - kafka-data:/var/lib/kafka/data
      - ./jmx-exporter:/opt/jmx-exporter

    networks:
      - monitoring    

  flink-jobmanager:
    image: flink:1.18
    container_name: flink-jobmanager
    command: jobmanager
    ports:
      - "8081:8081"

    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
        metrics.reporter.prom.port: 9249

    volumes:
      - flink-checkpoints:/opt/flink/checkpoints
      - flink-savepoints:/opt/flink/savepoints

    depends_on:
      - kafka

    networks:
      - monitoring  

  flink-taskmanager:
    image: flink:1.18
    container_name: flink-taskmanager
    command: taskmanager

    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
        metrics.reporter.prom.port: 9249

    volumes:
      - flink-checkpoints:/opt/flink/checkpoints
      - flink-savepoints:/opt/flink/savepoints

    depends_on:
      - flink-jobmanager

    networks:
      - monitoring

  clickhouse:
    image: clickhouse/clickhouse-server:24.1
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"

    environment:
      CLICKHOUSE_DB: industrial_analytics                                          
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: admin

    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-log:/var/log/clickhouse-server

    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - flink-jobmanager
      - flink-taskmanager 
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    ports:
      - "3000:3000"

    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource

    volumes:
      - grafana-data:/var/lib/grafana

    depends_on:
      - clickhouse
    networks:
      - monitoring

volumes:
  kafka-data:
  flink-checkpoints:
  flink-savepoints:
  clickhouse-data:
  clickhouse-log:
  grafana-data:
  
networks:
  monitoring:
    driver: bridge
    name: industrial_equipment_real_time_analytics_monitoring